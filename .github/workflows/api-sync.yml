name: Auto-Sync Instagram and Google Reviews API

on:
  schedule:
    # Run at midnight JST every day (15:00 UTC)
    - cron: '0 15 * * *'
  workflow_dispatch:
    # Allow manual trigger from the GitHub Actions tab

jobs:
  update-apis:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run API Sync Script
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          GOOGLE_PLACE_ID: ${{ secrets.GOOGLE_PLACE_ID }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
        run: |
          python .github/scripts/api_sync.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "Auto-update Instagram and Google Reviews via API" || echo "No changes to commit"
          git push origin main || echo "Failed to push or no changes"
