name: Autonomous LLMO (AEO) Engine

on:
  schedule:
    # Run every Monday at 00:00 UTC (09:00 JST)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Allow manual trigger

jobs:
  auto-optimize:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Run LLMO Freshness Engine
        run: python .github/scripts/llmo_auto_freshness.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || git commit -m "LLMO Auto-Update: Refreshed recency metadata for AI crawler visibility"
          git push
