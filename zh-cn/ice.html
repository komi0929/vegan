        </div>
        <div class="grid">
            <div class="donutsbox">
                <img src="../img/ice_berry-mix.png" alt="白い紙のカップにピンク色のアイスクリームが入っている。その横には、ベリーの写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>ベリーミックス</h3>
                    <p class="en">Berry&ensp;mix</p>
                </div>
                <p class="ex">厳選されたストロベリーとラズベリーをふんだんに使用。フレッシュな酸味と甘みが調和し、彩りも鮮やかです。</p>
                <div class="are">
                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_melting-chocolate.png" alt="白い紙のカップに茶色のアイスクリームが入っている。その横には、チョコソースの写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>とろけるショコラ</h3>
                    <p class="en">Melting&ensp;chocolate</p>
                </div>
                <p class="ex">深いカカオのコクが魅力の「とろけるショコラ」。ヴィーガンながらも、クリーミーでリッチな口どけを実現。</p>

                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_vanilla-coconut.png" alt="白い紙のカップにクリーム色のアイスクリームが入っている。その横には、ココナッツの写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>バニラココナッツ</h3>
                    <p class="en">Vanilla&ensp;coconut</p>
                </div>
                <p class="ex">香り高いバニラとまろやかなココナッツミルクを融合。ココナッツの自然な甘さと、バニラのやさしい香りが絶妙にマッチ。トロピカルな風を感じさせます。</p>
                <div class="are">
                    <img src="../img/soy-are.png" alt="大豆を使用しています">
                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_refreshing-apple.png" alt="白い紙のカップにクリーム色のアイスクリームが入っている。その横には、りんごの写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>爽やかりんご</h3>
                    <p class="en kinako">Refreshing&ensp;apple</p>
                </div>
                <p class="ex">りんごそのものの甘さと爽やかさが楽しめる、軽やかでフルーティーなジェラート。後味もすっきりとしており、大人から子どもまで気に入っていただけること間違いなし。</p>
                <div class="are">
                    <img src="../img/apple.png" alt="りんごを使用しています">
                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_toojuicy-thighs.png" alt="白い紙のカップに薄ピンク色のアイスクリームが入っている。その横には、みずみずしい桃の写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>ジューシーすぎるもも</h3>
                    <p class="en">Too&ensp;juicy&ensp;peach</p>
                </div>
                <p class="ex">たっぷりの桃果汁を贅沢に使用。まるで完熟した桃そのものを食べているかのような味わいをお届けします。</p>
                <div class="are">
                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_supremerich-matcha.png" alt="白い紙のカップに黄緑色のアイスクリームが入っている。その横には、抹茶粉の写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>至高の濃厚抹茶</h3>
                    <p class="en">Supreme&ensp;rich&ensp;matcha</p>
                </div>
                <p class="ex">石臼引きの高級抹茶を贅沢に使用。深みのある香りと、豊かな味わいが口いっぱいに広がります。香料や着色料を使わず、抹茶の本格的な風味を堪能できる一品です。</p>
                <div class="are">
                    <img src="../img/soy-are.png" alt="大豆を使用しています">
                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_fragrant-roasted-green-tea.png" alt="白い紙のカップに茶色のアイスクリームが入っている。その横には、ほうじ茶とその茶葉の写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>香ばしいほうじ茶</h3>
                    <p class="en">Fragrant&ensp;hojicha</p>
                </div>
                <p class="ex">香ばしい焙煎の香りが特徴。リラックスしたい、一息つきたい、そんなシーンにぴったりな、大人のための和風デザートです。</p>
                <div class="are">
                    <img src="../img/soy-are.png" alt="大豆を使用しています">
                </div>
            </div>
            <div class="donutsbox">
                <img src="../img/ice_juicy-dragon-fruit.png" alt="白い紙のカップに濃いピンク色のアイスクリームが入っている。その横には、ドラゴンフルーツの写真と商品名が印刷されたカップアイスの蓋が置かれている。" class="donutsimg">
                <div class="bigflex">
                    <h3>ジューシードラゴンフルーツ</h3>
                    <p class="en">Juicy&ensp;dragon&ensp;fruit</p>
                </div>
                <p class="ex">南国フルーツの代表「ドラゴンフルーツ」を使用した、エキゾチックな一品。鮮やかな色合いと爽やかな味わいが特徴で、見た目も味わいも楽しめます。</p>

                </div>
